{% extends 'base.html' %}
{% block title %}New Password — Pantry Nova{% endblock %}

{% block body %}
<div class="pn-auth-centered">
    <div class="pn-auth-card pn-card" style="padding: 40px; max-width: 460px;">
        <div style="text-align: center; margin-bottom: 24px;">
            <div style="font-size: 3rem;">🌿</div>
            <h2>Create New Password</h2>
            <p style="color: var(--pn-text-secondary);">Choose a strong password for your account.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="pn-form-group">
                <label class="pn-form-label">New Password</label>
                <input type="password" class="pn-form-control" name="password" id="np" data-password-strength="#npBar" required minlength="6">
                <div class="pn-progress" style="margin-top: 6px;"><div class="pn-progress-bar" id="npBar" style="width: 0;"></div></div>
            </div>
            <div class="pn-form-group">
                <label class="pn-form-label">Confirm Password</label>
                <div style="position: relative;">
                    <input type="password" class="pn-form-control" name="confirm_password" id="cp" required>
                    <span id="matchTick" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--pn-accent); display: none;">
                        <i class="bi bi-check-circle-fill"></i>
                    </span>
                </div>
            </div>
            <button class="pn-btn pn-btn-accent pn-btn-block" type="submit">
                🌿 Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const np = document.getElementById('np');
const cp = document.getElementById('cp');
const tick = document.getElementById('matchTick');
function check() {
    if (cp.value && np.value === cp.value) tick.style.display = 'block';
    else tick.style.display = 'none';
}
np.addEventListener('input', check);
cp.addEventListener('input', check);
</script>
{% endblock %}
