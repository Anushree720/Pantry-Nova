{% extends 'base.html' %}
{% block title %}Password Reset — Pantry Nova{% endblock %}

{% block body %}
<div class="pn-auth-centered">
    <div class="pn-auth-card pn-card" style="padding: 40px; max-width: 440px; text-align: center;">
        <div style="font-size: 4rem; animation: pnFloat 3s ease-in-out infinite;">🌿</div>
        <h2>Forgot Your Password?</h2>
        <p style="color: var(--pn-text-secondary);">Enter your email and we'll send a 6-digit reset code.</p>

        <form method="post" style="margin-top: 24px;">
            {% csrf_token %}
            <div class="pn-form-group">
                <input type="email" class="pn-form-control" name="email" placeholder="your@email.com" required style="text-align: center;">
            </div>
            <button class="pn-btn pn-btn-accent pn-btn-block" type="submit">
                <i class="bi bi-envelope-fill"></i> Send Reset Code
            </button>
        </form>

        <p style="margin-top: 20px;">
            <a href="{% url 'manager_login' %}" style="color: var(--pn-text-secondary); font-size: 0.9rem;">
                <i class="bi bi-arrow-left"></i> Back to Login
            </a>
        </p>
    </div>
</div>
{% endblock %}
